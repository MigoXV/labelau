name: Build Desktop App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build application
        run: pnpm build

      - name: Build Linux packages
        if: runner.os == 'Linux'
        run: pnpm exec electron-builder --linux AppImage deb --publish never

      - name: Build Windows packages
        if: runner.os == 'Windows'
        run: pnpm exec electron-builder --win nsis portable --publish never

      - name: Upload Linux packages
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: labelau-linux-packages
          path: |
            release/*.AppImage
            release/*.deb
            release/latest-linux.yml
          if-no-files-found: error

      - name: Upload Windows packages
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: labelau-windows-packages
          path: |
            release/*.exe
            release/*.msi
            release/latest*.yml
          if-no-files-found: error
